<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 勇敢公主：魔法數字冒險 🏰</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #2c003e 0%, #000000 100%);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .ui-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #e040fb;
            border-radius: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 0 20px #e040fb;
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            background: #4a148c;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .quest-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .floor {
            background: #7b1fa2;
            border: 2px solid #fff;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
        }
        .floor.completed { background: #4caf50; opacity: 0.6; cursor: default; }
        
        /* 彈窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: left;
        }
        .dialogue { font-size: 20px; margin-bottom: 20px; font-weight: bold; }
        .input-section { margin-bottom: 20px; }
        input[type="number"] {
            width: 100px;
            font-size: 24px;
            padding: 5px;
            border: 2px solid #7b1fa2;
            border-radius: 5px;
        }
        .unit-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .unit-btn {
            background: #f3e5f5;
            border: 1px solid #7b1fa2;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        .unit-btn.selected { background: #7b1fa2; color: white; }
        .submit-btn {
            background: #e040fb;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        #feedback { margin-top: 15px; text-align: center; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1>🏰 魔法數字冒險 🏰</h1>
        <div class="status-bar">
            <span>❤️ HP: <span id="hp">100</span></span>
            <span>✨ LV: <span id="lv">1</span></span>
            <span>💎 寶石: <span id="score">0</span></span>
        </div>
        <p>公主，請逐層挑戰魔法塔！輸入數值並選對單位才能擊敗守衛！</p>
        <div class="quest-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <div class="dialogue" id="qText"></div>
            <div class="input-section">
                數字結果：<input type="number" id="numInput" placeholder="?">
                <div class="unit-selector" id="unitBoard"></div>
            </div>
            <button class="submit-btn" onclick="checkMagic()">施展魔法！</button>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        const units = ["元", "個", "隻", "棵", "張", "粒", "米", "把"];
        const questions = [
            { q: "公主買了 450 元的魔法棒和 280 元的斗篷，付 1000 元，應找回多少？", n: 270, u: "元" },
            { q: "計算：627 - (336 + 124) = ?", n: 167, u: "個" },
            { q: "魔法盾牌售 850 元，比魔法劍貴 120 元。買一把魔法劍要多少元？", n: 730, u: "元" },
            { q: "計算：4089 - 1435 + 2546 = ?", n: 5200, u: "個" },
            { q: "買 5 份魔法餐盒（每份 27 元），付 150 元，應找回多少元？", n: 15, u: "元" },
            { q: "救護車去程用 18 分鐘，急救用 25 分鐘，回程用 20 分鐘。共用幾分鐘？", n: 63, u: "個" }, // 分鐘通常簡化為個/分鐘
            { q: "大盒珍珠有 48 粒，小盒有 9 粒。1 盒大比 5 盒小多幾粒？", n: 3, u: "粒" },
            { q: "每瓶藥水 48 元，買 4 瓶，加一個 36 元的袋子，共需多少元？", n: 228, u: "元" },
            { q: "計算：(52 - 18) × 4 = ?", n: 136, u: "個" },
            { q: "森林原有樹 879 棵，火災燒掉 667 棵，又種了 126 棵。現在有幾棵？", n: 338, u: "棵" },
            { q: "公主有 5000 元，買了 3 個魔法盒（每個 1200 元）和一個 400 元手袋。剩多少？", n: 1000, u: "元" },
            { q: "計算：300 - (120 + 80) = ?", n: 100, u: "個" },
            { q: "買 6 頂皇冠，每頂 80 元，付 500 元，找回多少元？", n: 20, u: "元" },
            { q: "每小時打磨 77 顆寶石，4 小時後共打磨多少顆？", n: 308, u: "粒" },
            { q: "承上題，如果一共要打 350 顆，還欠多少顆？", n: 42, u: "粒" },
            { q: "計算：14 + 6 × 9 = ?", n: 68, u: "個" },
            { q: "魔法項鍊有 145 顆鑽石，加了 85 顆後取下 30 顆。現在有幾顆？", n: 200, u: "粒" },
            { q: "救護站有 800 個繃帶，上午用 150 個，下午用 220 個。剩多少？", n: 430, u: "個" },
            { q: "買 5 件披風，原價 100 元，現每件減 15 元。共付多少元？", n: 425, u: "元" },
            { q: "計算：25 + 7 × 8 = ?", n: 81, u: "個" }
        ];

        let curIdx = -1;
        let selectedUnit = "";
        let hp = 100;
        let score = 0;

        const grid = document.getElementById("grid");
        questions.forEach((q, i) => {
            const f = document.createElement("div");
            f.className = "floor";
            f.innerText = i + 1;
            f.id = "f" + i;
            f.onclick = () => openFloor(i);
            grid.appendChild(f);
        });

        function openFloor(i) {
            if(document.getElementById("f"+i).classList.contains("completed")) return;
            curIdx = i;
            selectedUnit = "";
            document.getElementById("qText").innerText = "守衛第 " + (i+1) + " 層的謎題：\n" + questions[i].q;
            document.getElementById("numInput").value = "";
            document.getElementById("feedback").innerText = "";
            renderUnits();
            document.getElementById("overlay").style.display = "flex";
        }

        function renderUnits() {
            const board = document.getElementById("unitBoard");
            board.innerHTML = "";
            units.forEach(u => {
                const b = document.createElement("button");
                b.className = "unit-btn";
                b.innerText = u;
                b.onclick = () => {
                    selectedUnit = u;
                    Array.from(document.getElementsByClassName("unit-btn")).forEach(btn => btn.classList.remove("selected"));
                    b.classList.add("selected");
                };
                board.appendChild(b);
            });
        }

        function checkMagic() {
            const val = parseInt(document.getElementById("numInput").value);
            const fb = document.getElementById("feedback");
            const target = questions[curIdx];

            if(isNaN(val) || selectedUnit === "") {
                fb.innerText = "⚠️ 請輸入數字並選擇單位！";
                fb.style.color = "orange";
                return;
            }

            if(val === target.n && selectedUnit === target.u) {
                fb.innerText = "✨ 魔法成功！守衛被擊敗了！";
                fb.style.color = "green";
                score++;
                document.getElementById("score").innerText = score;
                document.getElementById("f"+curIdx).classList.add("completed");
                if(score % 5 === 0) document.getElementById("lv").innerText = (score/5 + 1);
                setTimeout(closeModal, 1500);
            } else {
                hp -= 10;
                document.getElementById("hp").innerText = hp;
                fb.innerText = "💥 咒語錯誤！遭受反擊！";
                fb.style.color = "red";
                if(hp <= 0) alert("公主昏倒了！重新開始吧！");
            }
        }

        function closeModal() { document.getElementById("overlay").style.display = "none"; }
    </script>
</body>
</html>
