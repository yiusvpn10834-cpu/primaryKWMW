<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart kids' iPad Games</title>
<style>
    body {
        font-family: 'Comic Sans MS', 'Arial', sans-serif;
        background-color: #eefbee; /* 可愛淺綠色背景 */
        color: #333;
        margin: 0;
        padding: 0;
        /* 避免在 iPad 上長按選取文字 */
        -webkit-user-select: none;
        user-select: none; 
    }
    .container {
        max-width: 1024px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
    }
    .header {
        background-color: #ffffff;
        padding: 15px;
        border-radius: 20px;
        border: 4px solid #82d19b;
        margin-bottom: 20px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }
    h1 { color: #2e8b57; margin: 10px 0; font-size: 2em;}
    
    /* Menu Styles */
    #menu-screen { display: block; margin-top: 50px; }
    .menu-btn {
        display: block;
        width: 80%;
        max-width: 400px;
        margin: 20px auto;
        padding: 25px;
        font-size: 1.5em;
        font-weight: bold;
        color: white;
        background-color: #82d19b;
        border: none;
        border-radius: 20px;
        box-shadow: 0 6px 0 #5eab77;
        cursor: pointer;
    }
    .menu-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #5eab77; }
    .menu-btn.pink { background-color: #ff9aa2; box-shadow: 0 6px 0 #e67e85; }
    .menu-btn.pink:active { box-shadow: 0 0 0 #e67e85; }

    /* Game Screens */
    .game-screen { display: none; }
    .back-btn {
        background-color: #ccc;
        color: #333;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 1.2em;
        margin-bottom: 20px;
        font-weight: bold;
    }

    /* Game 1: Map Styles */
    .map-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        background-color: #d0f0d9;
        padding: 20px;
        border-radius: 20px;
        margin: 20px auto;
        max-width: 600px;
        border: 4px solid #82d19b;
    }
    .building {
        background-color: white;
        border-radius: 15px;
        padding: 20px 10px;
        font-size: 1.3em;
        font-weight: bold;
        border: 3px solid #ccc;
        box-shadow: 0 4px 0 #aaa;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100px;
    }
    .building:active { transform: translateY(4px); box-shadow: 0 0 0 #aaa; }
    .building.road {
        background-color: #7f8c8d;
        color: white;
        border: none;
        box-shadow: none;
        cursor: default;
    }
    .building.road:active { transform: none; }
    .emoji { font-size: 2em; margin-bottom: 5px; }
    .instruction-box {
        background-color: #fff;
        padding: 20px;
        font-size: 1.4em;
        border-radius: 15px;
        border: 3px dashed #ff9aa2;
        margin-bottom: 20px;
        color: #d9534f;
        font-weight: bold;
    }

    /* Game 2: Slot Machine Styles */
    .slot-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
    }
    .slot {
        background-color: white;
        border: 4px solid #82d19b;
        border-radius: 15px;
        flex: 1;
        padding: 30px 10px;
        font-size: 1.4em;
        font-weight: bold;
        color: #2e8b57;
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .action-btn {
        background-color: #ff9aa2;
        color: white;
        border: none;
        padding: 20px 40px;
        font-size: 1.5em;
        border-radius: 15px;
        font-weight: bold;
        box-shadow: 0 6px 0 #e67e85;
        margin: 20px 0;
    }
    .action-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #e67e85; }
    
    .mc-options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
    .mc-btn {
        background-color: #fff;
        border: 3px solid #82d19b;
        padding: 15px;
        font-size: 1.3em;
        border-radius: 15px;
        color: #333;
        font-weight: bold;
    }
    .mc-btn:active { background-color: #d0f0d9; }
    
    #message-area {
        font-size: 1.5em;
        font-weight: bold;
        min-height: 40px;
        margin-top: 15px;
    }
    .correct { color: #2e8b57; }
    .wrong { color: #d9534f; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🐶 Smart kids' English Games 🐾</h1>
    </div>

    <div id="menu-screen">
        <button class="menu-btn" onclick="showGame('game1')">🗺️ 城市導航員<br><span style="font-size:0.6em">看指引，找地點</span></button>
        <button class="menu-btn pink" onclick="showGame('game2')">🎰 時光造句機<br><span style="font-size:0.6em">抽卡片，組句子</span></button>
    </div>

    <div id="game1" class="game-screen">
        <button class="back-btn" onclick="showMenu()">🔙 Back to Menu</button>
        <h2>Where am I going? 📍</h2>
        <div class="instruction-box" id="map-instruction">
            </div>
        <div class="map-grid">
            <div class="building" onclick="checkMap('Bakery')"><div class="emoji">🍞</div>Bakery</div>
            <div class="building road">Apple St. ⬇️</div>
            <div class="building" onclick="checkMap('Clinic')"><div class="emoji">🏥</div>Clinic</div>
            
            <div class="building road">Sunny Rd. ➡️</div>
            <div class="building road">🚦</div>
            <div class="building road">Sunny Rd. ➡️</div>
            
            <div class="building" onclick="checkMap('Cinema')"><div class="emoji">🎬</div>Cinema</div>
            <div class="building road">Apple St. ⬆️</div>
            <div class="building" onclick="checkMap('Sports Centre')"><div class="emoji">🏀</div>Sports Centre</div>
        </div>
        <div id="map-message" id="message-area" style="font-size: 1.5em; font-weight: bold; margin-top:15px; min-height: 40px;"></div>
    </div>

    <div id="game2" class="game-screen">
        <button class="back-btn" onclick="showMenu()">🔙 Back to Menu</button>
        <h2>Make a Sentence! 🪄</h2>
        <div class="slot-container">
            <div class="slot" id="slot-who">Who?</div>
            <div class="slot" id="slot-action">Action?</div>
            <div class="slot" id="slot-time">Time?</div>
        </div>
        <button class="action-btn" id="spin-btn" onclick="spinSlots()">抽卡 (Draw!)</button>
        
        <div id="quiz-area" style="display:none;">
            <h3 id="quiz-task" style="color:#d9534f;"></h3>
            <div class="mc-options" id="mc-options">
                </div>
        </div>
        <div id="slot-message" id="message-area" style="font-size: 1.5em; font-weight: bold; margin-top:15px; min-height: 40px;"></div>
    </div>
</div>

<script>
// --- Navigation ---
function showMenu() {
    document.getElementById('menu-screen').style.display = 'block';
    document.getElementById('game1').style.display = 'none';
    document.getElementById('game2').style.display = 'none';
    // Reset states
    document.getElementById('map-message').innerText = "";
    document.getElementById('slot-message').innerText = "";
    document.getElementById('quiz-area').style.display = 'none';
}

function showGame(gameId) {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById(gameId).style.display = 'block';
    if(gameId === 'game1') loadMapQuestion();
}

// --- Game 1: Map Navigator Logic ---
const mapQuestions = [
    { text: "Go straight ahead. Turn right into Sunny Road. It is next to the Clinic.", ans: "Sports Centre" },
    { text: "It is opposite the Cinema. It is at the corner of Apple Street and Sunny Road.", ans: "Bakery" },
    { text: "Walk across Sunny Road. It is on your right, next to the Sports Centre.", ans: "Cinema" },
    { text: "It is opposite the Bakery. It is on Apple Street.", ans: "Clinic" }
];
let currentMapQ = 0;

function loadMapQuestion() {
    document.getElementById('map-message').innerText = "";
    document.getElementById('map-instruction').innerText = mapQuestions[currentMapQ].text;
}

function checkMap(buildingName) {
    if(buildingName === mapQuestions[currentMapQ].ans) {
        document.getElementById('map-message').innerHTML = "<span class='correct'>🎉 Correct! You found it!</span>";
        setTimeout(() => {
            currentMapQ = (currentMapQ + 1) % mapQuestions.length;
            loadMapQuestion();
        }, 2000);
    } else {
        document.getElementById('map-message').innerHTML = "<span class='wrong'>Oops! 找錯地方囉，再看一次指示！</span>";
    }
}

// --- Game 2: Slot Machine Logic ---
const subjects = ["We", "I", "Uncle Tom", "The boys"];
const actions = ["visit a museum", "eat seafood", "watch a ballet", "go to Ocean Park"];
const times = ["tomorrow", "next Sunday", "later"];

let currentDraw = {};

function spinSlots() {
    document.getElementById('slot-message').innerText = "";
    document.getElementById('quiz-area').style.display = 'none';
    
    // Randomly pick
    currentDraw.who = subjects[Math.floor(Math.random() * subjects.length)];
    currentDraw.action = actions[Math.floor(Math.random() * actions.length)];
    currentDraw.time = times[Math.floor(Math.random() * times.length)];
    
    document.getElementById('slot-who').innerText = currentDraw.who;
    document.getElementById('slot-action').innerText = currentDraw.action;
    document.getElementById('slot-time').innerText = currentDraw.time;
    
    setTimeout(generateQuiz, 500);
}

function generateQuiz() {
    document.getElementById('quiz-area').style.display = 'block';
    const tasks = ["positive", "negative", "question"];
    const taskType = tasks[Math.floor(Math.random() * tasks.length)];
    
    let promptText = "";
    let correctAns = "";
    let wrong1 = "";
    let wrong2 = "";
    
    let subjectLower = currentDraw.who === "I" ? "I" : currentDraw.who.toLowerCase();

    if (taskType === "positive") {
        promptText = "請選出正確的【肯定句】 (Positive)";
        correctAns = `${currentDraw.who} will ${currentDraw.action} ${currentDraw.time}.`;
        wrong1 = `${currentDraw.who} will ${currentDraw.action}s ${currentDraw.time}.`;
        wrong2 = `${currentDraw.who} are ${currentDraw.action} ${currentDraw.time}.`;
    } else if (taskType === "negative") {
        promptText = "請選出正確的【否定句】 (Negative)";
        correctAns = `${currentDraw.who} won't ${currentDraw.action} ${currentDraw.time}.`;
        wrong1 = `${currentDraw.who} don't ${currentDraw.action} ${currentDraw.time}.`;
        wrong2 = `${currentDraw.who} won't ${currentDraw.action}s ${currentDraw.time}.`;
    } else {
        promptText = "請選出正確的【問句】 (Question)";
        correctAns = `Where will ${subjectLower} go ${currentDraw.time}?`;
        wrong1 = `Where do ${subjectLower} go ${currentDraw.time}?`;
        wrong2 = `Where will ${subjectLower} goes ${currentDraw.time}?`;
    }
    
    document.getElementById('quiz-task').innerText = promptText;
    
    let options = [correctAns, wrong1, wrong2];
    options.sort(() => Math.random() - 0.5); // Shuffle
    
    let optionsHtml = "";
    options.forEach(opt => {
        // Use single quotes for the onclick argument to avoid breaking the string
        let escapedOpt = opt.replace(/'/g, "\\'");
        let escapedAns = correctAns.replace(/'/g, "\\'");
        optionsHtml += `<button class="mc-btn" onclick="checkSlotAns('${escapedOpt}', '${escapedAns}')">${opt}</button>`;
    });
    
    document.getElementById('mc-options').innerHTML = optionsHtml;
}

function checkSlotAns(selected, correct) {
    if(selected === correct) {
        document.getElementById('slot-message').innerHTML = "<span class='correct'>🎉 Bingo! 句子造對了！</span>";
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('spin-btn').innerText = "再抽一次！ (Play Again)";
    } else {
        document.getElementById('slot-message').innerHTML = "<span class='wrong'>Oops! 文法有點小錯，再選一次！</span>";
    }
}
</script>

</body>
</html>
